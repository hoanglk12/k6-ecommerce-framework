name: k6 Load Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - '.github/workflows/k6-tests.yml'
  pull_request:
    branches: [main]
  schedule:
    # Run regression tests daily at 6 AM UTC (4 PM AEST)
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Test type to run'
        required: true
        default: 'smoke'
        type: choice
        options:
          - smoke
          - load
          - stress
      site:
        description: 'Site to test'
        required: true
        default: 'platypus'
        type: choice
        options:
          - platypus
          - skechers
      vus:
        description: 'Number of virtual users (smoke/load only)'
        required: false
        default: '10'
      duration:
        description: 'Test duration (e.g., 2m, 10m)'
        required: false
        default: '2m'

env:
  K6_VERSION: '0.49.0'
  NODE_VERSION: '18'

jobs:
  # ============================================================================
  # BUILD JOB
  # ============================================================================
  build:
    name: Build k6 Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build tests
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: k6-dist
          path: dist/
          retention-days: 7

  # ============================================================================
  # SMOKE TEST JOB (PR Validation)
  # ============================================================================
  smoke-test:
    name: Smoke Test
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event.inputs.test_type == 'smoke'
    
    strategy:
      matrix:
        site: [platypus, skechers]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: k6-dist
          path: dist/

      - name: Setup k6
        uses: grafana/setup-k6-action@v1
        with:
          k6-version: ${{ env.K6_VERSION }}

      - name: Run Smoke Test
        run: |
          k6 run \
            --vus ${{ github.event.inputs.vus || '10' }} \
            --duration ${{ github.event.inputs.duration || '2m' }} \
            --env SITE=${{ matrix.site }} \
            --env ENVIRONMENT=staging \
            --env DRY_RUN=false \
            --out json=results-${{ matrix.site }}.json \
            dist/tests/smoke.test.js
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-results-${{ matrix.site }}
          path: results-*.json
          retention-days: 30

      - name: Check test results
        run: |
          if [ -f results-${{ matrix.site }}.json ]; then
            echo "Test results generated for ${{ matrix.site }}"
          else
            echo "No results file found"
            exit 1
          fi

  # ============================================================================
  # REGRESSION TEST JOB (Scheduled)
  # ============================================================================
  regression-test:
    name: Regression Test
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: k6-dist
          path: dist/

      - name: Setup k6
        uses: grafana/setup-k6-action@v1
        with:
          k6-version: ${{ env.K6_VERSION }}

      - name: Run Regression Test - Platypus
        run: |
          k6 run \
            --vus 20 \
            --duration 5m \
            --env SITE=platypus \
            --env ENVIRONMENT=staging \
            --out json=regression-platypus.json \
            dist/tests/smoke.test.js
        continue-on-error: true

      - name: Run Regression Test - Skechers
        run: |
          k6 run \
            --vus 20 \
            --duration 5m \
            --env SITE=skechers \
            --env ENVIRONMENT=staging \
            --out json=regression-skechers.json \
            dist/tests/smoke.test.js
        continue-on-error: true

      - name: Upload regression results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-results
          path: regression-*.json
          retention-days: 90

  # ============================================================================
  # LOAD TEST JOB (Manual Trigger)
  # ============================================================================
  load-test:
    name: Load Test
    needs: build
    runs-on: ubuntu-latest
    if: github.event.inputs.test_type == 'load'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: k6-dist
          path: dist/

      - name: Setup k6
        uses: grafana/setup-k6-action@v1
        with:
          k6-version: ${{ env.K6_VERSION }}

      - name: Run Load Test
        run: |
          k6 run \
            --env SITE=${{ github.event.inputs.site }} \
            --env ENVIRONMENT=staging \
            --out json=load-results.json \
            dist/tests/load.test.js
        continue-on-error: true
        env:
          K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}

      - name: Upload load test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-results
          path: load-results.json
          retention-days: 90

  # ============================================================================
  # CLOUD TEST JOB (Grafana Cloud)
  # ============================================================================
  cloud-test:
    name: Cloud Load Test
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.test_type == 'load'
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: k6-dist
          path: dist/

      - name: Setup k6
        uses: grafana/setup-k6-action@v1
        with:
          k6-version: ${{ env.K6_VERSION }}

      - name: Run Cloud Test
        run: |
          k6 cloud \
            --env SITE=${{ github.event.inputs.site }} \
            --env ENVIRONMENT=staging \
            dist/tests/load.test.js
        env:
          K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}
          K6_CLOUD_PROJECT_ID: ${{ secrets.K6_CLOUD_PROJECT_ID }}

  # ============================================================================
  # SUMMARY JOB
  # ============================================================================
  summary:
    name: Test Summary
    needs: [smoke-test]
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'pull_request'
    
    steps:
      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          pattern: smoke-results-*
          merge-multiple: true

      - name: Generate Summary
        run: |
          echo "## 📊 k6 Load Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Site | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          
          for file in results-*.json; do
            if [ -f "$file" ]; then
              site=$(echo $file | sed 's/results-//' | sed 's/.json//')
              echo "| $site | ✅ Completed |" >> $GITHUB_STEP_SUMMARY
            fi
          done
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📝 Full results available in Actions artifacts" >> $GITHUB_STEP_SUMMARY
